packages:
  - "apps/*"
  - "packages/*"
  - "packages/*/{dev,debug}"
  - "packages/*/{dev,debug}/*"
  - "packages/plugins/**"

catalog:
  "@tauri-apps/api": ^2.0.0
  "@tailwindcss/cli": ^4.3.0
  "@tailwindcss/vite": ^4.3.0
  "@playwright/test": ^1.57.0
  "@types/node": ^25.9.1
  "@vitest/coverage-v8": 4.1.8
  jsdom: ^29.1.1
  oxfmt: ^0.54.0
  oxlint: ^1.69.0
  tailwindcss: ^4.3.0
  tsdown: ^0.22.2
  typescript: ^6.0.3
  vite: ^8.0.16
  vitest: ^4.0.17

blockExoticSubdeps: true
trustPolicy: no-downgrade
allowBuilds:
  "@parcel/watcher": true
  esbuild: true
