packages:
  - "apps/*"
  - "packages/*"
  - "packages/*/{dev,debug}"
  - "packages/*/{dev,debug}/*"
  - "packages/plugins/**"

catalog:
  "@tauri-apps/api": ^2.0.0
  "@tailwindcss/cli": ^4.3.2
  "@tailwindcss/vite": ^4.3.2
  "@playwright/test": ^1.61.1
  "@types/node": ^26.1.0
  "@vitest/coverage-v8": ^4.1.10
  esbuild: ^0.28.1
  jsdom: ^29.1.1
  oxfmt: ^0.57.0
  oxlint: ^1.72.0
  tailwindcss: ^4.3.2
  tsdown: ^0.22.3
  typescript: ^6.0.3
  vite: ^8.1.3
  vitest: ^4.1.10

blockExoticSubdeps: true
trustPolicy: no-downgrade
allowBuilds:
  "@parcel/watcher": true
  esbuild: true
