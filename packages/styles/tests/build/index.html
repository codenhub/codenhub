<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@codenhub/styles Tailwind source build</title>
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body>
    <main class="sect bg-background text-text font-default" data-testid="build-root">
      <div class="sect-container">
        <section class="card bg-foreground xs:bg-surface 2xl:bg-background" data-testid="responsive-card">
          <p class="text-label text-text-secondary">Tailwind source CSS</p>
          <h1 class="text-title-lg">Build-time tokens</h1>
          <p class="text-body">Consumer builds can process token utilities and component classes.</p>
          <input class="ipt" value="Tailwind build" />
          <button class="btn info loading" aria-label="Loading">Loading</button>
          <span class="tooltip icon" data-tooltip="Tailwind source tooltip" data-tooltip-position="right">?</span>
        </section>

        <section class="dark card bg-background text-text" data-testid="build-dark-card">
          <p class="text-title-sm">Dark variant</p>
          <p class="dark:text-primary text-text-secondary" data-testid="dark-variant-text">Dark variant text</p>
          <button class="btn primary">Dark primary</button>
        </section>
      </div>
    </main>
  </body>
</html>
