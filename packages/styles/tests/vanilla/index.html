<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@codenhub/styles compiled CSS preview</title>
    <link rel="stylesheet" href="./output.css" />
  </head>
  <body>
    <main class="sect" data-testid="preview-root">
      <div class="sect-container">
        <section class="card selection-contrast" data-testid="light-card">
          <p class="text-label">Compiled CSS</p>
          <h1 class="text-display">Light tokens</h1>
          <p class="text-body">Base styles, typography utilities, cards, inputs, tooltips, and selection styles.</p>
          <label class="text-label" for="vanilla-input">Email</label>
          <input id="vanilla-input" class="ipt" value="hello@codenhub.test" />
          <div>
            <button class="btn primary" data-testid="primary-button">Primary</button>
            <button class="btn secondary">Secondary</button>
            <button class="btn success loading" aria-label="Saving">Saving</button>
            <button class="btn destructive" disabled>Disabled</button>
          </div>
          <span class="tooltip icon" data-tooltip="Compiled CSS tooltip" data-tooltip-position="top">?</span>
        </section>

        <section class="dark card" data-testid="dark-card">
          <p class="text-title-sm">Dark tokens</p>
          <p class="text-body">The compiled stylesheet supports dark mode with a local <code>.dark</code> class.</p>
          <button class="btn primary" data-testid="dark-primary-button">Dark primary</button>
        </section>
      </div>
    </main>
  </body>
</html>
