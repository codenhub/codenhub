<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@codenhub/styles native playground</title>
    <script>
      const doc = document.documentElement;
      const params = new URLSearchParams(window.location.search);
      const env = params.get("env") === "build" ? "build" : "vanilla";
      const nextEnv = env === "build" ? "vanilla" : "build";
      const href = env === "build" ? "/entry-tw-native.css" : "/entry-vanilla-native.css";
      document.write(`<link rel="stylesheet" href="${href}" />`);
      doc.dataset.env = env;

      document.addEventListener("DOMContentLoaded", () => {
        const environmentToggle = document.getElementById("environment-toggle");

        if (environmentToggle) {
          const tooltip = `See ${nextEnv}`;
          environmentToggle.dataset.tooltip = tooltip;
          environmentToggle.setAttribute("aria-label", tooltip);
          environmentToggle.addEventListener("click", () => {
            const nextUrl = new URL(window.location.href);
            nextUrl.searchParams.set("env", nextEnv);
            window.location.assign(nextUrl.toString());
          });
        }

        const updateTheme = (dark) => {
          if (dark) {
            doc.classList.add("dark");
            doc.classList.remove("light");
          } else {
            doc.classList.add("light");
            doc.classList.remove("dark");
          }
        };

        const themePref = localStorage.getItem("theme");
        let isDarkTheme =
          themePref === "dark" || (!themePref && window.matchMedia("(prefers-color-scheme: dark)").matches);

        updateTheme(isDarkTheme);

        document.getElementById("theme-toggle").addEventListener("click", () => {
          isDarkTheme = !isDarkTheme;
          updateTheme(isDarkTheme);
          localStorage.setItem("theme", isDarkTheme ? "dark" : "light");
        });
      });
    </script>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <main class="sect bg-background text-text font-default" style="gap: 3rem" data-testid="preview-root">
      <section class="sect-inn">
        <h1>Native Typography & Links</h1>
        <div style="display: flex; flex-direction: column; gap: 1rem">
          <h1>Heading 1 (h1)</h1>
          <h2>Heading 2 (h2)</h2>
          <h3>Heading 3 (h3)</h3>
          <h4>Heading 4 (h4)</h4>
          <h5>Heading 5 (h5)</h5>
          <h6>Heading 6 (h6)</h6>
          <p>
            This is a native paragraph (p) showing default typography. It can contain
            <span>spans</span>
            and
            <a href="#" style="color: var(--color-primary); text-decoration: underline">native links (a)</a>
            .
          </p>
        </div>
      </section>

      <section class="sect-inn">
        <h2>Native Form Controls</h2>
        <div style="display: flex; flex-direction: column; gap: 1.5rem; max-width: 400px">
          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Text Input</label>
            <input type="text" placeholder="Type something..." />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Email Input</label>
            <input type="email" placeholder="email@example.com" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Password Input</label>
            <input type="password" placeholder="Password" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">URL Input</label>
            <input type="url" placeholder="https://example.com" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Tel Input</label>
            <input type="tel" placeholder="+1 (555) 000-0000" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Number Input</label>
            <input type="number" placeholder="42" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Search Input</label>
            <input type="search" placeholder="Search..." />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Date Input</label>
            <input type="date" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Datetime-Local Input</label>
            <input type="datetime-local" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Month Input</label>
            <input type="month" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Week Input</label>
            <input type="week" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Time Input</label>
            <input type="time" />
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Select Dropdown</label>
            <select>
              <option value="">Choose an option...</option>
              <option value="1">Option 1</option>
              <option value="2">Option 2</option>
            </select>
          </div>

          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500">Textarea</label>
            <textarea rows="4" placeholder="Enter message..."></textarea>
          </div>

          <div style="display: flex; gap: 1.5rem; align-items: center">
            <label style="display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer">
              <input type="checkbox" checked />
              <span>Checkbox</span>
            </label>

            <label style="display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer">
              <input type="radio" name="radio-group" value="1" checked />
              <span>Radio 1</span>
            </label>
            <label style="display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer">
              <input type="radio" name="radio-group" value="2" />
              <span>Radio 2</span>
            </label>
          </div>
        </div>
      </section>

      <section class="sect-inn">
        <h2>Native Buttons</h2>
        <div style="display: flex; flex-wrap: wrap; gap: 1rem">
          <button>button element</button>
          <input type="button" value="input[type='button']" />
          <input type="submit" value="input[type='submit']" />
          <input type="reset" value="input[type='reset']" />
        </div>
      </section>
    </main>

    <!-- Floating controls similar to index.html -->
    <div
      style="
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        z-index: 9999;
        display: inline-flex;
        gap: 0.5rem;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      "
    >
      <button
        id="environment-toggle"
        class="tooltip"
        data-testid="environment-toggle"
        data-tooltip="See build"
        data-tooltip-position="left"
        style="
          height: 2.5rem;
          width: 2.5rem;
          padding: 0.5rem;
          display: flex;
          align-items: center;
          justify-content: center;
          background: var(--color-surface);
          border-radius: 50%;
          cursor: pointer;
          color: var(--color-text);
          border: 1px solid var(--color-border);
        "
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M22 7.7c0-.6-.4-1.2-.8-1.5l-6.3-3.9a1.72 1.72 0 0 0-1.7 0l-10.3 6c-.5.2-.9.8-.9 1.4v6.6c0 .5.4 1.2.8 1.5l6.3 3.9a1.72 1.72 0 0 0 1.7 0l10.3-6c.5-.3.9-1 .9-1.5Z"
          />
          <path d="M10 21.9V14L2.1 9.1" />
          <path d="m10 14 11.9-6.9" />
          <path d="M14 19.8v-8.1" />
          <path d="M18 17.5V9.4" />
        </svg>
      </button>
      <button
        id="theme-toggle"
        class="tooltip"
        data-tooltip="Toggle theme"
        data-tooltip-position="left"
        style="
          height: 2.5rem;
          width: 2.5rem;
          padding: 0.5rem;
          display: flex;
          align-items: center;
          justify-content: center;
          background: var(--color-surface);
          border-radius: 50%;
          cursor: pointer;
          color: var(--color-text);
          border: 1px solid var(--color-border);
        "
      >
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <path fill="currentColor" d="M12 18a6 6 0 0 0 0-12v12z" />
        </svg>
      </button>
    </div>
  </body>
</html>
